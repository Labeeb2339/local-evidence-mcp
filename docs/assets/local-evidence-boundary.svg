<title id="title">Local Evidence MCP policy boundary and executable control inventory</title>
<desc id="desc">The checked-in example policy exposes 3 synthetic files through 5 MCP tools and advertises 0 execution capabilities. The test suite contains 18 named checks grouped by enforced boundary.</desc>
